<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Web</title>

<style>

html, body {
    margin: 0;
    height: 100%;
}

body {
    background-image: url("fondo.jpg.jpeg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: "Times New Roman", serif;
}

.contenido {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: rgba(0,0,0,0.35);
}

h1 {
    color: #FF2400;
    font-size: 40px;
}

p {
    color: white;
    font-size: 22px;
}

.imagen {
    width: 300px;
    max-width: 90%;
    height: auto;
    border-radius: 12px;
    margin: 20px 0;
}

a {
    margin-top: 20px;
    background: #FF2400;
    color: white;
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 8px;
}

a:hover {
    background: darkred;
}

</style>

</head>

<body>

<div class="contenido">

    <h1>¡Hola Mundo!</h1>

    <p>Este es mi primer párrafo en código HTML.</p>

    <img src="im1.jpeg" alt="Mi imagen" class="imagen">

    <a href="https://google.com" target="_blank">
        Ir a Google
    </a>

</div>

</body>
</html>
