<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Web</title>

<style>

html, body {
    margin: 0;
    height: 100%;
}

body {
    background-image: url("fondo.jpg.jpeg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: "Times New Roman", serif;
}

.contenido {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: rgba(0,0,0,0.35);
    position: relative;
}

h1 {
    color: #FF2400;
    font-size: 40px;
}

p {
    color: white;
    font-size: 22px;
}

.imagen {
    width: 150px;
    height: auto;
    position: absolute;
    top: 30px;
    right: 30px;
    border-radius: 12px;
}

</style>

</head>

<body>

<div class="contenido">

    <img src="im1.jpeg" alt="Mi imagen" class="imagen">

    <h1>¡Hola Mundo!</h1>

    <p>En construcción. La excelencia requiere tiempo.</p>

</div>

</body>

</html>
